# AI_moon ROS2 통합 파라미터 (트랙에서 튜닝하는 값 모음)

camera_node:
  ros__parameters:
    publish_topic: /camera/image/compressed
    camera_type: usb          # 'usb' | 'csi' (JetRacer CSI 카메라면 csi)
    camera_device: /dev/video1  # C920 웹캠 (video0은 Telechips 내장 videoinput0)
    image_width: 640
    image_height: 480
    publish_hz: 30.0
    flip_180: false
    jpeg_quality: 85          # 90→85 (2026-07-13): enc 6.1→4.7ms, 구독 4곳 dec 5.2→4.4ms, HSV 픽셀 드리프트 ≤1.2% 실측
                              # passthrough 시 미사용 (카메라 자체 압축 사용)
    passthrough_mjpg: false   # C920 원본 JPEG 은 133KB/디코딩 21ms 로 구독자 5곳이 4.7배 비싸짐 (실측) — 재인코딩이 총비용 우위

lane_detection_node:
  ros__parameters:
    image_topic: /camera/image/compressed
    process_hz: 30.0
    version: safe             # 'safe' | 'fast'
    speed_safe: 0.180
    speed_fast: 0.5
    use_pid: false
    publish_debug_image: true  # 디버그 영상 끔 (+1~2fps) — 슬라이딩윈도우 확인할 땐 true
    debug_every: 5             # 디버그 영상 N프레임당 1장 (25Hz 기준 5fps — 뷰어 확인용으론 충분) 로
    show_gui: false           # 모니터/VNC 연결 시 true → imshow + HSV 트랙바
    # 슬라이딩윈도우 튜닝값 (조종기 튜너/param set 으로 실시간 변경 가능)
    sw_margin: 94             # 추적 윈도우 좌우 반폭
    sw_win_h1: 380            # 초기 탐색창 윗변 y
    sw_win_half: 148          # 초기 탐색창 반폭 (145/495 중심)
    sw_circle_height: 280     # 조향 기준점(ld) y — 80~459
    sw_road_width: 0.5       # 차선 폭 비율
    sw_nwindows: 20           # 추적 윈도우 개수 (×20px = 추적 높이, ld 커버 필요)
    sw_minpix: 0              # 윈도우 유효 최소 픽셀 (노이즈 문턱, 0=1픽셀도 인정)
    # PID 게인 (use_pid: true 일 때만 사용 — 지그재그/출렁임 억제)
    pid_kp: 0.7
    pid_ki: 0.0008
    pid_kd: 0.15

    # 차선 마스크에 들어갈 색 (일반 차선: 흰+주황 / 회전교차로 링: 노랑)
    lane_use_white: true
    lane_use_yellow: true     # 회전교차로 노란 링 추종에 필요 (HSV 는 현장에서 튜닝)
    # HSV 튜닝값 (조명 환경에 맞게 트랙에서 조정)
    hsv_yellow_lower: [20, 110, 110]
    hsv_yellow_upper: [35, 255, 255]
    hsv_white_lower: [0, 0, 188]
    hsv_white_upper: [179, 20, 255]

# ---------------- 인지 (SEA:ME 미션용) ----------------

aruco_detect_node:
  ros__parameters:
    image_topic: /camera/image/compressed
    process_hz: 15.0             # 정지판정 지연 = appear_frames/hz (15Hz×2f=0.13s) — 1Hz 는 지연 2s 라 위험, 복원
    aruco_dict: DICT_6X6_250     # 보유 마커 실측 확정 (2026-07-11, ID=3 검출 ✓) — 대회 마커가 다르면 재확인
    min_marker_height_px: 20     # 반응 거리 (작으면 멀리서도 반응)
    target_ids: [-1]             # 반응할 마커 ID. [-1]=전체, 특정만: [3] 또는 [3, 7]
    detect_downscale: 2          # 반해상도 검출 (비용 ~1/5 실측). 마커가 32px 미만으로 보여야 하면 1 로
    publish_debug_image: false   # CPU 절약 (인코딩 3.6ms/f) — 아루코 디버깅할 땐 true
    # 검출기 비용 프루닝 (실측 21.9→2.1ms/f, 40px 마커 검출 유지 검증) — 원복: 0.03 / 3 / 23
    min_perimeter_rate: 0.08     # 둘레 8% 미만(≈변 6px) 후보 제거 — 6x6 는 24px 미만 디코딩 불가라 손실 없음
    thresh_win_min: 23           # 적응 임계 멀티스케일(3/13/23) → 23 단일 (조명 극불균일 시 3 으로)
    thresh_win_max: 23

red_zone_node:
  ros__parameters:
    image_topic: /camera/image/compressed
    process_hz: 3.0
    roi: [240, 480, 0, 640]      # 바닥이 보이는 하단부 (640x480 기준)
    hsv_red1_lower: [0, 80, 60]  # 빨강 low-hue 구간
    hsv_red1_upper: [10, 255, 255]
    hsv_red2_lower: [160, 80, 60]  # 빨강 high-hue 구간
    hsv_red2_upper: [179, 255, 255]
    on_pixel_threshold: 4000     # 이상이면 is_red=true
    off_pixel_threshold: 1500    # 미만이면 is_red=false (히스테리시스)
    publish_debug_image: false   # CPU 절약 — 빨간구간 HSV 튜닝할 땐 true

# ---------------- 미션 ----------------

traffic_light_mission:
  ros__parameters:
    enabled: true                # false = green 대기 없이 바로 주행 (race.launch use_yolo:=false 가 자동 제어)
    publish_hz: 10.0
    green_stable_frames: 1       # green 연속 N프레임 → 출발
    red_stable_frames: 1        # red 연속 N프레임 → 도착 정지
    min_drive_time_sec: 20.0     # 출발 후 이 시간 동안 red 무시 (1랩보다 짧게, 실측 조정)
    lap_count: 1                 # 대회 규정 확정(현장): 1랩 + 마지막 신호등 red 정지 = 즉시 FINISH latch

dynamic_obs_mission:
  ros__parameters:
    enabled: true
    publish_hz: 10.0
    appear_frames: 2             # 아루코 연속 N프레임 → 즉시 정지 (15Hz 기준 ≈0.13s)
    clear_frames: 8              # 미검출 연속 N프레임 → 재출발 (≈0.53s, 깜빡임 조기출발 방지)
    use_red_gate: false          # true: 빨간 구간(/is_red)에서만 정지 발동

roundabout_mission:
  ros__parameters:
    enabled: true               # ⚠️ 현장에서 entry/loop/exit 튜닝 후 true
    publish_hz: 30.0            # EXIT 이 lane_angle+bias 를 자기 주기로 발행 → 탈출 조향 반응성 위해 30 유지
    entry_min_sec: 0.0           # 출발 후 이 시간 전엔 진입 감시 안 함
    entry_max_sec: 10000.0          # 도달 시 orange 무관 강제 진입 (시간 기반 fallback)
    use_yellow_arm: true
    yellow_arm_threshold: 1500   # /yellow_pixels 진입 임계 (실측! — 회전교차로 노란 링)
    loop_done_mode: both         # 'time' | 'steer' | 'both'
    loop_sec: 30.0                # 1회전 소요 시간 (실측!)
    steer_integral_target: 30.0   # |조향%| 적분 목표 (실측! /roundabout/steer_integral 관찰)
    loop_lane_side: LEFT         # 회전 중 추종 차선 (안쪽. 정방향 반시계 기준 LEFT)
    exit_mode: lane_steer        # 'lane_steer'(차선+바이어스, 권장) | 'lane' | 'steer'(고정)
    exit_lane_side: RIGHT        # 탈출 시 추종 차선 (바깥쪽)
    exit_angle: -100.0           # lane_steer: 차선 조향에 가산할 바이어스 / steer: 고정 조향
    exit_speed: 0.178              # 탈출 속도 (0 이하면 차선 속도 그대로)
    exit_duration_sec: 3.0       # 탈출 유지 시간 → 이후 BOTH 복귀
    track_reverse: false         # 역방향 트랙 배정 시 true (차선/조향/적분 자동 반전)

main_planner:
  ros__parameters:
    control_topic: /control
    loop_hz: 30.0
    steering_gain: 0.0029      # 픽셀 오차(±320) -> steering percent(±1) 변환
    invert_steering: false
    throttle_gain: 1.0        # speed(0.2~0.5) -> throttle percent
    max_throttle: 0.6

control_node:
  ros__parameters:
    control_topic: /control
    command_hz: 30.0
    command_timeout: 0.5
    i2c_bus: 3                # JetRacer(Jetson)=1, TOPST D3-G=3 (0x40 스캔 확인)
    pca9685_addr: 0x40
    steering_channel: 0
    throttle_channel: 1
    steer_trim: 0.12          # 직진 보정 (2026-07-08 topic pub 테스트로 실측 — steering 0.12 에서 직진)
    max_throttle: 0.6
    dry_run: false            # 하드웨어 없이 테스트 시 true
    manual_timeout: 0.4       # 조종기 입력 우선권 유지 시간 (초)
    # 서보/ESC 캘리브레이션 (펄스폭 us) — 조향 범위/중립 이상 시에만 조정
    servo_center_us: 1500
    servo_span_us: 500
    esc_neutral_us: 1500
    esc_fwd_us: 2000
    esc_rev_us: 1000

yolo_detect_node:
  ros__parameters:
    # NCNN(ARM 최적화) — A72 실측: 640모델 323ms(2T) / 320모델 55ms. 원복: yolo26n_traffic_ncnn_model + imgsz 640
    # ⚠️ 320 전환(2026-07-13, 통합 25Hz 확보): 먼 신호등 검출 거리 감소 가능 — /yolo/image/debug 로 거리 검증할 것
    model_path: /home/topst/ai_moon_ros2/models/yolo26n_traffic_320_ncnn_model
    image_topic: /camera/image/compressed
    detect_topic: /traffic_sign
    infer_hz: 2.5            # 320+1T 추론 ~250ms(통합 부하 실측) — 여유 확인 후 상향 검토
    ncnn_threads: 1          # 통합 부하 실측: 2T 290ms vs 1T 251ms — 스레드풀 선점 낭비로 1T 가 더 빠름
    conf_threshold: 0.7      # 0.5 에서 상향 — 320 모델이 빨간구간 바닥을 red 로 오인해 랩 오카운트 (2026-07-13 실주행). 실물 신호등은 0.9대라 여유
    imgsz: 320               # 320 모델과 짝 (640 모델로 원복 시 640 으로)
    min_box_height_px: 30     # 이보다 작은(먼) 검출 무시 — 반응 거리 튜닝
    stable_frames: 3          # N회 연속 검출 시 발행 (오검출 억제)
    publish_debug_image: true
    device: ''                # ''=자동, 'cpu', '0'(CUDA)
